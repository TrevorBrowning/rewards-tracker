<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">Rewards Tracker</div>

        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="employees.html">Employees</a>
            <a href="reports.html" class="active">Reports</a>
            <a href="employee.html">Employee Profile</a>
        </nav>

        <button id="logoutBtn">Logout</button>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <header class="header">
            <h1>Reports</h1>
            <p class="subtext">Daily performance entries</p>
        </header>

        <!-- ADD REPORT -->
        <section class="card">

            <h2>Add Report</h2>

            <input type="date" id="reportDate">

            <select id="employeeSelect">
                <option value="">Select Employee</option>
            </select>

            <input type="number" id="transactions" placeholder="Transactions">

            <input type="number" id="rewards" placeholder="Rewards Used">

            <button id="addReportBtn">Add Report</button>

        </section>

        <!-- REPORT TABLE -->
        <section class="card">

            <h2>All Reports</h2>

            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Employee</th>
                        <th>Transactions</th>
                        <th>Rewards</th>
                        <th>%</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="reportTable"></tbody>

            </table>

        </section>

    </main>

</div>

<script src="reports.js"></script>

</body>
</html>
