<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewards Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <h1>Rewards Tracker</h1>
    <p class="subtitle">Enter store password to continue</p>

    <form id="loginForm">
        <input
            type="password"
            id="password"
            placeholder="Store Password"
            required
        >

        <button type="submit">
            Login
        </button>
    </form>
</div>

<script src="script.js"></script>

</body>
</html>
