<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>Login | Rewards Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-header">
        <div class="login-logo-icon">🏆</div>
        <h1>Rewards Tracker</h1>
        <p class="subtitle">Enter your assigned access key below to enter the dashboard</p>
    </div>

    <form id="loginForm">
        <div class="field">
            <label for="accessKey">Authorization Key</label>
            <input 
                type="password" 
                id="accessKey" 
                placeholder="Enter Store Auth" 
                required
                autofocus
            >
        </div>

        <button type="submit" class="btn-primary">
            Verify & Open Dashboard
        </button>
    </form>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
