<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCR Upload</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<div class="main">

    <h1>Upload Rewards Report</h1>

    <div class="card">

        <input
            type="file"
            id="imageInput"
            accept="image/*"
        >

        <button id="scanBtn" class="btn-primary">
            Scan Report
        </button>

    </div>

    <div class="card">

        <h2>Detected Date</h2>

        <input
            type="date"
            id="reportDate"
        >

    </div>

    <div class="card">

        <h2>Detected Employees</h2>

        <table>

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Transactions</th>
                    <th>Rewards</th>
                    <th>%</th>
                </tr>
            </thead>

            <tbody id="resultsBody"></tbody>

        </table>

    </div>

    <div class="card">

        <button
            id="saveBtn"
            class="btn-primary"
        >
            Save Reports
        </button>

    </div>

</div>

<script src="ocr.js"></script>

</body>
</html>
