<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Admin Console</title>
    <style>
        body { display: none; font-family: system-ui, sans-serif; background: #f8fafc; padding: 40px; color: #0f172a; }
        .danger-zone { border: 2px solid #ef4444; background: #fff5f5; padding: 24px; border-radius: 8px; max-width: 500px; }
        button { background: #ef4444; color: white; border: none; padding: 12px 24px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        button:hover { background: #dc2626; }
    </style>
</head>
<body>

    <h2>Master System Admin Console</h2>
    <p>Logged in as: <span id="adminEmail">Checking...</span></p>
    <hr>

    <div class="danger-zone">
        <h3>☢️ Danger Zone</h3>
        <p>Clicking the button below will perform a server-side wipe of every single submitted cashier report in Firestore. This action is permanent.</p>
        <button id="wipeDatabaseBtn">Wipe All Reports Data</button>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== 'trevryanbrowning@gmail.com') {
                alert("Unauthorized Access Attempt Intercepted.");
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("adminEmail").textContent = user.email;
                document.body.style.display = "block"; // Safely reveal layout
            }
        });

        document.getElementById("wipeDatabaseBtn").addEventListener("click", async () => {
            const confirmation = confirm("ARE YOU ABSOLUTELY SURE? This deletes all data permanently from Firestore.");
            if (!confirmation) return;

            const finalDoubleCheck = confirm("FINAL WARNING: This cannot be undone. Proceed with global wipe?");
            if (!finalDoubleCheck) return;

            try {
                const querySnapshot = await getDocs(collection(db, "reports"));
                
                // Fire off deletion promises concurrently
                const deletePromises = querySnapshot.docs.map(documentSnapshot => 
                    deleteDoc(doc(db, "reports", documentSnapshot.id))
                );
                
                await Promise.all(deletePromises);
                alert("Database successfully wiped clean.");
            } catch (error) {
                console.error("Wipe failed: ", error);
                alert("Error wiping database: " + error.message);
            }
        });
    </script>
</body>
</html>
