<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Performance Report</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 20px;
            color: #222;
        }

        .report{
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom: 5px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom: 20px;
        }

        .summary{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .card{
            background:#f9fafc;
            padding:15px;
            border-radius:10px;
            text-align:center;
            border:1px solid #eee;
        }

        .card h3{
            margin-bottom:8px;
            font-size:14px;
            color:#666;
        }

        .card p{
            font-size:20px;
            font-weight:bold;
        }

        .top{
            background: linear-gradient(135deg, #ffefba, #ffffff);
            border: 1px solid #f0d98c;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th, td{
            padding:12px;
            border-bottom:1px solid #eee;
            text-align:left;
        }

        th{
            background:#fafafa;
        }

        .good{
            color: green;
            font-weight:bold;
        }

        .bad{
            color: #cc0000;
            font-weight:bold;
        }

        .print-btn{
            margin: 20px 0;
            padding: 10px 15px;
            border:none;
            border-radius:8px;
            background:#cc0000;
            color:white;
            cursor:pointer;
        }

        @media print {
            .print-btn{
                display:none;
            }

            body{
                background:white;
            }

            .report{
                box-shadow:none;
            }
        }

    </style>
</head>
<body>

<div class="report">

    <h1>Weekly Performance Report</h1>
    <p class="subtitle" id="weekRange">Loading...</p>

    <button class="print-btn" onclick="window.print()">
        Print Report
    </button>

    <div class="summary">

        <div class="card">
            <h3>Store Average</h3>
            <p id="storeAvg">0%</p>
        </div>

        <div class="card">
            <h3>Total Reports</h3>
            <p id="totalReports">0</p>
        </div>

        <div class="card top">
            <h3>Top Performer</h3>
            <p id="topPerformer">N/A</p>
        </div>

        <div class="card">
            <h3>Best Day</h3>
            <p id="bestDay">0%</p>
        </div>

    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Employee</th>
                <th>Transactions</th>
                <th>Rewards</th>
                <th>%</th>
            </tr>
        </thead>

        <tbody id="reportBody"></tbody>

    </table>

</div>

<script src="print.js"></script>

</body>
</html>
